{% extends "base.html" %}

{% block title %}Inicio — Market Shop{% endblock %}

{% block extra_styles %}
<style>
    .image {
        width: 100%;
        height: 320px;
        object-fit: cover;
        border-radius: 4px;
        display: block;
        background: #e0dfd8;
    }

    .content {
        margin-top: 2.5rem;
    }

    .content h1 {
        font-size: 1.8rem;
        font-weight: normal;
        margin-bottom: 1rem;
        line-height: 1.3;
    }

    .content p {
        font-size: 1rem;
        line-height: 1.8;
        color: #444;
    }
</style>
{% endblock %}

{% block content %}

    <img
        src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80"
        alt="Bienvenida"
        class="image"
    />

    <div class="content">
        <h1>Bienvenido a Market Shop</h1>
        <p>
            Este es un sitio web sencillo hecho con Flask. Aquí puedes registrarte
            o iniciar sesión para acceder al contenido. 
        </p>
    </div>

{% endblock %}
