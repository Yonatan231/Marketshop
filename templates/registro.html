{% extends "base.html" %}

{% block title %}Registrarse — Mi Sitio{% endblock %}

{% block extra_styles %}
<style>
    .form-card {
        background: #fff;
        border: 1px solid #e8e8e4;
        border-radius: 4px;
        max-width: 400px;
        margin: 0 auto;
        padding: 2.5rem;
    }

    .form-card h1 {
        font-size: 1.4rem;
        font-weight: normal;
        margin-bottom: 2rem;
        color: #222;
    }

    .form-group {
        margin-bottom: 1.2rem;
    }

    .form-group label {
        display: block;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        color: #888;
        margin-bottom: 0.4rem;
        text-transform: uppercase;
    }

    .form-group input {
        width: 100%;
        padding: 0.6rem 0.8rem;
        border: 1px solid #e8e8e4;
        border-radius: 3px;
        font-family: Georgia, serif;
        font-size: 0.95rem;
        color: #222;
        background: #fafaf8;
        outline: none;
        transition: border-color 0.2s;
    }

    .form-group input:focus {
        border-color: #aaa;
        background: #fff;
    }

    .btn-submit {
        width: 100%;
        padding: 0.7rem;
        margin-top: 0.8rem;
        background: #222;
        color: #fff;
        border: none;
        border-radius: 3px;
        font-family: Georgia, serif;
        font-size: 0.9rem;
        letter-spacing: 0.04em;
        transition: background 0.2s;
    }

    .btn-submit:hover {
        background: #444;
    }

    .form-footer {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.85rem;
        color: #888;
    }

    .form-footer a {
        color: #222;
        text-decoration: none;
        border-bottom: 1px solid #ccc;
    }

    .form-footer a:hover {
        border-color: #222;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Crear cuenta</h1>

    <form method="POST" action="{{ url_for('registro.registro') }}">

        <div class="form-group">
            <label for="nombre_completo">Nombre</label>
            <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Tu nombre" required>
        </div>

        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="form-group">
            <label for="contrasenia">Contraseña</label>
            <input type="password" id="contrasenia" name="contrasenia" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">Registrarse</button>
    </form>

    <p class="form-footer">
        ¿Ya tienes cuenta?
        <a href="{{ url_for('sesion.iniciar_sesion') }}">Iniciar Sesión</a>
    </p>
</div>
{% endblock %}
